<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/login.css" />
</head>

<body>

<!-- Botão temporário — acesso sem autenticação para testes -->
<!-- <a href="/dashboard" class="btn-skip">&#9654; Entrar sem login (remover dps)</a> -->
 <div class="btn-skip">
    &#9654; Entrar como:
    <a href="#" onclick="entrarComo('DENTISTA')">Dentista</a>
    <a href="#" onclick="entrarComo('RECEPCAO')">Recepcao</a>
    <a href="#" onclick="entrarComo('GESTOR')">Gestor</a>
 </div> 

<!-- ═══════════════════════════════════════
     SPLASH SCREEN
═══════════════════════════════════════ -->
<div id="splash">

    <div id="icon-wrap">
        <!-- Anel decorativo -->
        <svg id="splash-ring" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
            <circle id="ring-path" cx="55" cy="55" r="48"
                fill="none" stroke="#2d6a9f" stroke-width="0.8"
                stroke-dasharray="301.6" stroke-dashoffset="301.6" opacity="0.5" />
            <circle cx="55" cy="55" r="48"
                fill="none" stroke="#2d6a9f" stroke-width="0.3" opacity="0.12" />
        </svg>

        <!-- Dente SVG -->
        <svg id="splash-logo" viewBox="0 0 82 90" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path id="tooth-body"
                d="M26 8C20 8 13 13.5 13 22C13 27.5 14 33 16 39.5C18.5 48.5 20 59 25.5 68C27 72 29.5 74 33 73C36 72 36.5 67.5 37.5 62.5C38.5 58 40 56 42 56C44 56 45.5 58 46.5 62.5C47.5 67.5 48 72 51 73C54.5 74 57 72 58.5 68C64 59 65.5 48.5 68 39.5C70 33 71 27.5 71 22C71 13.5 64 8 58 8C54 8 50 10.5 42 10.5C34 10.5 30 8 26 8Z"
                fill="rgba(26,58,92,0.7)" stroke="#2d6a9f" stroke-width="1.2"
                stroke-dasharray="270" stroke-dashoffset="270"
                stroke-linecap="round" stroke-linejoin="round" />
            <path id="tooth-detail"
                d="M28 21C25 21 22 23.5 22 27C22 30.5 25 33 28 33C31 33 33 31 35 29.5C37 31 39 33 42 33C45 33 47 31 49 29.5C51 31 53 33 56 33C59 33 62 30.5 62 27C62 23.5 59 21 56 21C53 21 51 23.5 49 26C47 23.5 45 21 42 21C39 21 37 23.5 35 26C33 23.5 31 21 28 21Z"
                fill="none" stroke="#78c3ff" stroke-width="1"
                stroke-dasharray="145" stroke-dashoffset="145"
                stroke-linecap="round" opacity="0.8" />
        </svg>
    </div>

    <div class="brand-wrap">
        <div id="brand-line1">Facilita Lab</div>
        <div id="brand-line2">Sistema de Gestão · Lab Odontológico</div>
    </div>

    <div id="tagline">Laboratório Odontológico — Protótipo</div>

    <div id="progress-wrap">
        <div id="progress-fill"></div>
    </div>

    <div id="dot-row">
        <div class="dot-item"></div>
        <div class="dot-item"></div>
        <div class="dot-item"></div>
    </div>

</div>

<!-- ═══════════════════════════════════════
     TELA DE LOGIN
═══════════════════════════════════════ -->
<div id="login-screen" class="login-wrapper">
    <div class="login-card">

        <div class="login-brand">
            <div class="login-brand-icon">
                <svg viewBox="0 0 82 90" fill="none" xmlns="http://www.w3.org/2000/svg" width="30" height="33">
                    <path d="M26 8C20 8 13 13.5 13 22C13 27.5 14 33 16 39.5C18.5 48.5 20 59 25.5 68C27 72 29.5 74 33 73C36 72 36.5 67.5 37.5 62.5C38.5 58 40 56 42 56C44 56 45.5 58 46.5 62.5C47.5 67.5 48 72 51 73C54.5 74 57 72 58.5 68C64 59 65.5 48.5 68 39.5C70 33 71 27.5 71 22C71 13.5 64 8 58 8C54 8 50 10.5 42 10.5C34 10.5 30 8 26 8Z"
                        fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Boas vindas a <span class="brand-name">Facilita Lab.</span></h1>
            <p>Acesse sua conta para continuar</p>
            <p>Colocar dps recuperar senha, etc. (Remover esse <./p>)</p>
        </div>

        <div class="login-fields">
            <div class="login-field">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" />
            </div>
            <div class="login-field">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" />
            </div>
        </div>

        <button id="btnLogin" class="btn-primary" onclick="login()">Entrar</button>

        <div id="mensagem"></div>

    </div>
</div>

<script src="/js/login.js"></script>
</body>

</html>
