<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Usuário – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/cadastro-usuario.css" />
</head>
<body>

<div class="app">

    <!-- Substituiu: <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside> -->
    <div id="sidebar-container"></div>

    <main class="content">
        <div class="page-header">
            <a href="/lista" class="btn-voltar"><span class="btn-voltar-seta">&#8592;</span> Voltar para a lista</a>
            <h1>Editar Usuário</h1>
            <span class="page-sub">Atualize os dados do usuário</span>
        </div>

        <div class="card">

            <div class="field">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome completo" />
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="usuario@email.com" />
            </div>

            <div class="field">
                <label for="perfil">Perfil</label>
                <select id="perfil" onchange="atualizarCampos()">
                    <option value="">Selecione...</option>
                    <option value="GESTOR">Gestor</option>
                    <option value="RECEPCAO">Recepção</option>
                    <option value="CADISTA">Cadista</option>
                    <option value="DENTISTA">Dentista</option>
                </select>
            </div>

            <div class="field">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
            </div>

            <div class="field">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
            </div>

            <!-- Exclusivo: Dentista -->
            <div id="campo-cro" style="display:none;">
                <div class="field">
                    <label for="cro">CRO</label>
                    <input type="text" id="cro" placeholder="CRO-SP 000000" maxlength="20" />
                </div>
            </div>

            <div class="field">
                <label for="senha">Nova senha</label>
                <input type="password" id="senha" placeholder="Deixe em branco para manter a atual" />
            </div>

            <div class="field">
                <label for="confirmarSenha">Confirmar senha</label>
                <input type="password" id="confirmarSenha" placeholder="Repita a nova senha" />
            </div>

            <button id="btnSalvar" class="btn-primary" onclick="salvar()">Salvar Alterações</button>
            <div id="mensagem"></div>
        </div>
    </main>

</div>

<!-- sidebar.js carrega o HTML da sidebar e define o item ativo via pathname -->
<script src="/js/sidebar.js"></script>
<script src="/js/masks.js"></script>
<script src="/js/editar-usuario.js"></script>
</body>
</html>
