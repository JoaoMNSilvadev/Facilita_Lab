<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Pedido – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/cadastro.css" />
</head>

<body>
    <div class="app">
        <!-- Substituiu: <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside> -->
        <div id="sidebar-container"></div>

        <main class="content">
            <div class="page-header">
                <a href="/lista-pedidos" class="btn-voltar"><span class="btn-voltar-seta">&#8592;</span> Voltar para a lista</a>
                <h1>Novo Pedido</h1>
                <span class="page-sub">Preencha os dados para cadastrar</span>
            </div>

            <div class="card">
                <div class="field">
                    <label for="cor">Cor <span class="obrigatorio">*</span></label>
                    <input type="text" id="cor" placeholder="Ex: A2, Branco, OM3" maxlength="50" />
                </div>

                <div class="field">
                    <label for="tipoProtese">Tipo de Prótese <span class="obrigatorio">*</span></label>
                    <select id="tipoProtese">
                        <option value="">Selecione...</option>
                        <option value="COROA">Coroa</option>
                        <option value="PONTE">Ponte</option>
                        <option value="IMPLANTE">Implante</option>
                        <option value="PROVISORIO">Provisório</option>
                        <option value="FACETA">Faceta</option>
                        <option value="INLAY">Inlay</option>
                    </select>
                </div>

                <div class="field">
                    <label for="material">Material <span class="obrigatorio">*</span></label>
                    <select id="material">
                        <option value="">Selecione...</option>
                        <option value="ZIRCONIA">Zircônia</option>
                        <option value="RESINA">Resina</option>
                        <option value="METAL">Metal</option>
                        <option value="CERAMICA">Cerâmica</option>
                    </select>
                </div>

                <div class="field">
                    <label for="prazoEntrega">Prazo de Entrega <span class="obrigatorio">*</span></label>
                    <input type="date" id="prazoEntrega" />
                </div>

                <div class="field">
                    <label for="dentistaId">Dentista <span class="obrigatorio">*</span></label>
                    <select id="dentistaId">
                        <option value="">Carregando dentistas...</option>
                    </select>
                </div>

                <div class="field">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" placeholder="Observações adicionais (opcional)" maxlength="500" rows="4"></textarea>
                </div>

                <button id="btnCadastrar" class="btn-primary" onclick="cadastrar()">Cadastrar</button>
                <div id="mensagem"></div>
            </div>
        </main>
    </div>

    <!-- sidebar.js carrega o HTML da sidebar e define o item ativo via pathname -->
    <script src="/js/sidebar.js"></script>
    <script src="/js/cadastro-pedido.js"></script>
</body>

</html>
