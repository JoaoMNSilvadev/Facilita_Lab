<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuários – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/lista.css" />
</head>

<body>
    <div class="app">
        <!-- Substituiu: <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside> -->
        <div id="sidebar-container"></div>

        <main class="content">
            <div class="page-header">
                <div class="page-header-row">
                    <div>
                        <h1>Usuários Cadastrados</h1>
                        <span class="page-sub">Lista de todos os usuários do sistema</span>
                    </div>
                    <a href="/cadastro-usuario" class="btn-primary btn-novo">+ Cadastrar novo usuário</a>
                </div>
            </div>

            <div class="filtros">
                <button class="filtro-btn active" data-perfil="">Todos</button>
                <button class="filtro-btn" data-perfil="GESTOR">Gestor</button>
                <button class="filtro-btn" data-perfil="RECEPCAO">Recepção</button>
                <button class="filtro-btn" data-perfil="CADISTA">Cadista</button>
                <button class="filtro-btn" data-perfil="DENTISTA">Dentista</button>
            </div>

            <div class="table-card">
                <table id="tabela">
                    <thead>
                    <tr>
                        <th>Nome</th>
                        <th>E-mail</th>
                        <th>Perfil</th>
                        <th>Cadastrado em</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="corpo"></tbody>
                </table>
                <p id="vazio" style="display:none">Nenhum usuário encontrado.</p>
            </div>
        </main>
    </div>

    <!-- sidebar.js carrega o HTML da sidebar e define o item ativo via pathname -->
    <script src="/js/sidebar.js"></script>
    <script src="/js/lista-usuario.js"></script>
</body>

</html>
