<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Usuários – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/lista-usuario.css" />
</head>
<body>

<div class="app">

    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside>

    <main class="content">
        <div class="page-header">
            <h1>Usuários Cadastrados</h1>
            <span class="page-sub">Lista de todos os usuários do sistema</span>
        </div>

        <div class="table-card">
            <table id="tabela">
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Perfil</th>
                    <th>Cadastrado em</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody id="corpo"></tbody>
            </table>
            <p id="vazio" style="display:none">Nenhum usuário cadastrado.</p>
        </div>
    </main>

</div>

<script src="/js/lista-usuario.js"></script>

</body>
</html>
