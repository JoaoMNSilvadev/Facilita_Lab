<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editar Usuário – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/cadastro-usuario.css" />
</head>
<body>

<div class="app">

    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside>

    <main class="content">
        <div class="page-header">
            <h1>Editar Usuário</h1>
            <span class="page-sub">Atualize os dados do usuário</span>
        </div>

        <div class="card">
            <div class="field">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome completo" required/>
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="usuario@email.com" required/>
            </div>

            <div class="field">
                <label for="perfil">Perfil</label>
                <select id="perfil">
                    <option value="">Selecione...</option>
                    <option value="DENTISTA">Dentista</option>
                    <option value="RECEPCAO">Recepção</option>
                    <option value="CADISTA">Cadista</option>
                    <option value="GESTOR">Gestor</option>
                </select>
            </div>

            <div class="field">
                <label for="senha">Nova senha</label>
                <input type="password" id="senha" placeholder="Deixe em branco para manter a senha atual"/>
                <small>Deixe em branco para manter a senha atual</small>
            </div>

            <div class="field">
                <label for="confirmarSenha">Confirmar senha</label>
                <input type="password" id="confirmarSenha" placeholder="Repita a nova senha"/>
            </div>

            <button id="btnSalvar" onclick="salvar()">Salvar Alterações</button>
            <div id="mensagem"></div>
        </div>
    </main>

</div>

<script src="/js/editar-usuario.js"></script>

</body>
</html>
