<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/cadastro-usuario.css" />
</head>
<body>

<div class="app">

    <aside class="sidebar">
        <div class="sidebar-brand">Facilita Lab</div>
        <nav>
            <a href="/dashboard" class="nav-item" data-page="dashboard">
                <span class="nav-icon">⊞</span> Dashboard
            </a>
            <a href="/lista" class="nav-item" data-page="lista">
                <span class="nav-icon">☰</span> Usuários
            </a>
            <a href="/cadastro" class="nav-item active" data-page="cadastro">
                <span class="nav-icon">＋</span> Novo Usuário
            </a>
        </nav>
    </aside>

    <main class="content">
        <div class="page-header">
            <h1>Novo Usuário</h1>
            <span class="page-sub">Preencha os dados para cadastrar</span>
        </div>

        <div class="card">
            <div class="field">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome completo" required/>
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="usuario@email.com" required/>
            </div>

            <div class="field">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required/>
            </div>

            <div class="field">
                <label for="perfil">Perfil</label>
                <select id="perfil">
                    <option value="">Selecione...</option>
                    <option value="DENTISTA">Dentista</option>
                    <option value="RECEPCAO">Recepção</option>
                    <option value="CADISTA">Cadista</option>
                    <option value="GESTOR">Gestor</option>
                </select>
            </div>

            <button id="btnCadastrar" onclick="cadastrar()">Cadastrar</button>
            <div id="mensagem"></div>
        </div>
    </main>

</div>

<script src="/js/cadastro-usuario.js"></script>

</body>
</html>
