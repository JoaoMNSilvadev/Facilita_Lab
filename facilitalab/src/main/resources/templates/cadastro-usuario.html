<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário – Facilita Lab</title>
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/cadastro-usuario.css" />
</head>
<body>

<div class="app">

    <aside th:replace="~{fragments/sidebar :: sidebar(${activePage})}"></aside>

    <main class="content">
        <div class="page-header">
            <h1>Novo Usuário</h1>
            <span class="page-sub">Preencha os dados para cadastrar</span>
        </div>

        <div class="card">

            <!-- Campos sempre visíveis -->
            <div class="field">
                <label for="nome">Nome</label>
                <input type="text" id="nome" placeholder="Nome completo" />
            </div>

            <div class="field">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="usuario@email.com" />
            </div>

            <div class="field">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" />
            </div>

            <div class="field">
                <label for="perfil">Perfil</label>
                <select id="perfil" onchange="atualizarCampos()">
                    <option value="">Selecione...</option>
                    <option value="GESTOR">Gestor</option>
                    <option value="RECEPCAO">Recepção</option>
                    <option value="CADISTA">Cadista</option>
                    <option value="DENTISTA">Dentista</option>
                </select>
            </div>

            <div class="field">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
            </div>

            <div class="field">
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
            </div>

            <!-- Exclusivo: Funcionário (Gestor, Recepção, Cadista) -->
            <div id="campos-funcionario" style="display:none; flex-direction:column; gap:1.1rem;">
                <div class="field">
                    <label for="salario">Salário</label>
                    <input type="number" id="salario" placeholder="0,00" step="0.01" min="0" />
                </div>
                <div class="field">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" placeholder="00000-000" maxlength="9" />
                </div>
            </div>

            <!-- Exclusivo: Dentista -->
            <div id="campo-cro" style="display:none;">
                <div class="field">
                    <label for="cro">CRO</label>
                    <input type="text" id="cro" placeholder="CRO-SP 000000" maxlength="20" />
                </div>
            </div>

            <button id="btnCadastrar" onclick="cadastrar()">Cadastrar</button>
            <div id="mensagem"></div>
        </div>
    </main>

</div>

<script src="/js/cadastro-usuario.js"></script>
</body>
</html>
