spring.application.name = facilitalab

  # ── Banco de dados ──────────────────────────────────────────
  spring.datasource.url: jdbc:mysql://localhost:3306/facilitalab_db?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
    spring.datasource.username=FacilitaLabUser
    spring.datasource.password=FacilitaLabPass123
    spring.datasource.driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────
  spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.format_sql=true
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

  # ── Upload de arquivos ───────────────────────────────────────
  spring.servlet.multipart.enabled=true
    spring.servlet.multipart.max-file-size=100MB
    spring.servlet.multipart.max-request-size=110MB

  # ── E-mail (notificações) ────────────────────────────────────
  spring.mail.host=smtp.gmail.com
    spring.mail.port=587
    spring.mail.username=seu_email@gmail.com
    spring.mail.password=sua_senha_de_app
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true

# ── Servidor ─────────────────────────────────────────────────
server.port=8080
  spring.web.error.include-message=always
    spring.web.error.include-binding-errors=always

